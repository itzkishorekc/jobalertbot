name: Job Hunt (5pm UK)

on:
  # GitHub cron is UTC (no timezone support), so schedule both 16:00 and 17:00 UTC.
  # We run only when Europe/London hour == 17 (handles BST/GMT automatically).
  schedule:
    - cron: "0 16 * * *"
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore seen DB cache
        uses: actions/cache@v4
        with:
          path: seen_jobs.sqlite3
          key: seen-db-${{ github.run_id }}
          restore-keys: |
            seen-db-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check if it's 5pm in UK
        id: uk_time
        run: |
          HOUR=$(TZ=Europe/London date +%H)
          echo "uk_hour=$HOUR" >> $GITHUB_OUTPUT

      - name: Run bot (only at 17:00 UK time)
        if: steps.uk_time.outputs.uk_hour == '17' || github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: python uk_sponsor_mech_bot.py
